<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゴール駆動・青チャ学習</title>
<style>
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;color:#1a1a1a;background:#f0ede4;margin:0;padding:14px;line-height:1.5}
  .container{max-width:720px;margin:0 auto}
  h1{font-size:20px;margin:0 0 4px}
  .subtitle{color:#666;font-size:13px;margin-bottom:14px}
  .panel{background:#fafaf7;border:1px solid #e5e3dc;border-radius:12px;padding:16px;margin-bottom:14px}
  .panel h2{font-size:15px;margin:0 0 10px;color:#444}

  .goal-card{background:#fff;border:1px solid #e5e3dc;border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
  .goal-card.on{background:#fef9e8;border-color:#d4b056;border-left-width:4px}
  .goal-card.custom{border-left:3px solid #6b8b9b}
  .goal-card.custom.on{border-left-width:4px}
  .goal-head{display:flex;align-items:center;gap:10px}
  .goal-icon{font-size:22px}
  .goal-info{flex:1}
  .goal-name{font-weight:700;font-size:15px}
  .goal-desc{font-size:12px;color:#666;margin-top:2px}
  .goal-stat{font-size:12px;color:#888;display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
  .goal-stat .core{color:#a04040;font-weight:600}
  .goal-stat .rec{color:#b88a3c;font-weight:600}
  .goal-progress{margin-top:6px}
  .progress-bar{background:#e5e3dc;height:8px;border-radius:4px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,#7bb47b,#4a9b4a);transition:width .5s ease}
  .progress-fill.star{background:linear-gradient(90deg,#e8c870,#d4b056)}
  .goal-note{font-size:11px;color:#888;margin-top:6px;display:none}
  .goal-card.on .goal-note{display:block}

  .card{background:linear-gradient(180deg,#fff 0%,#faf7ed 100%);border-radius:14px;padding:20px;border:1px solid #e5e3dc;box-shadow:0 2px 8px rgba(0,0,0,0.04);text-align:center;margin-bottom:12px}
  .card-label{font-size:11px;color:#888;letter-spacing:3px;font-weight:600;margin-bottom:8px}
  .ex-no{font-size:30px;font-weight:700;margin:6px 0}
  .ex-no .kind{font-size:12px;color:#888;background:#f0ede4;padding:3px 10px;border-radius:6px;margin-right:8px;font-weight:600;letter-spacing:1px;vertical-align:middle}
  .ex-title{font-size:17px;color:#333;margin:8px 0;font-weight:600}
  .ex-meta{font-size:12px;color:#666;margin-top:6px}
  .ex-tags{display:flex;justify-content:center;gap:4px;flex-wrap:wrap;margin-top:10px}
  .tag{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600;letter-spacing:0.3px}
  .tag.core{background:#fce8e8;color:#a04040}
  .tag.rec{background:#fdf0d0;color:#8b6b1f}
  .tag.opt{background:#e8eef0;color:#566970}
  .diff-stars{color:#d4a056;font-size:14px;margin-top:6px;letter-spacing:1px}

  .btn{background:#1a1a1a;color:#fff;border:none;padding:11px 22px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;margin:3px}
  .btn:hover{background:#333}
  .btn.sec{background:#fff;color:#1a1a1a;border:1px solid #d4d1c4}
  .actions{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap}
  .grade-btns{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px}
  .grade{padding:8px 14px;border-radius:8px;border:1px solid #d4d1c4;background:#fff;cursor:pointer;font-size:13px;font-weight:600}
  .grade.tri{color:#a07020;border-color:#e5c590}
  .grade.cir{color:#2a6b2a;border-color:#9bc89b}
  .grade.star{color:#8b6b1f;border-color:#d4b056;background:#fef7e0}

  .chip{display:inline-block;padding:5px 11px;border-radius:14px;border:1px solid #d4d1c4;background:#fff;cursor:pointer;font-size:12px;user-select:none;margin:2px}
  .chip.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

  .empty{text-align:center;color:#888;padding:30px 20px}

  details{margin-top:6px}
  summary{cursor:pointer;font-size:13px;color:#555;padding:4px 0;user-select:none}
  details[open] summary{color:#1a1a1a;font-weight:600}

  .toolbar{display:flex;gap:6px;justify-content:flex-end;margin-top:8px}
  .toolbar button{background:none;border:1px solid #d4d1c4;color:#666;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px}

  .modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;padding:14px}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:14px;padding:20px;max-width:560px;width:100%;max-height:90vh;overflow:auto}
  .modal h3{margin:0 0 10px;font-size:18px}
  .modal-close{background:#1a1a1a;color:#fff;border:none;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;margin-top:12px;width:100%}

  .chap-grid{display:grid;grid-template-columns:1fr;gap:6px;margin-top:6px}
  .chap-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#f8f6ef;border-radius:6px;font-size:13px}
  .chap-row .chap-name{flex:1;font-size:12px}
  .chap-row select{font-size:11px;padding:3px;border-radius:4px;border:1px solid #d4d1c4;background:#fff}

  .hist-row{display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid #f0eee5;font-size:13px;gap:8px}
  .hist-row:first-child{border-top:none}
  .hist-meta{font-size:11px;color:#888}
  .hist-grade{font-weight:600;padding:2px 8px;border-radius:10px;font-size:11px;white-space:nowrap}
  .hg-tri{background:#fdf0d0;color:#8b6b1f}
  .hg-cir{background:#d8eed8;color:#2a6b2a}
  .hg-star{background:#fef0c0;color:#8b6b1f}
  .stat-row{display:flex;justify-content:space-between;font-size:13px;color:#555;padding:3px 0}
  .stat-row strong{color:#1a1a1a}

  .toggle-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px}
  .toggle-row label{font-size:13px;color:#555}

  input[type=text]{width:100%;padding:8px 10px;border:1px solid #d4d1c4;border-radius:6px;font-size:14px;font-family:inherit}
  input[type=text]:focus{outline:none;border-color:#1a1a1a}
</style>
</head>
<body>
<div class="container">
  <h1>🎯 ゴール駆動・青チャ学習</h1>
  <div class="subtitle">学びたいゴールを選ぶ → 必要な青チャ例題が出題される。</div>

  <div class="panel">
    <h2>🎯 学習ゴール(複数選択可)</h2>
    <div id="goalList"></div>
    <details>
      <summary>+ カスタムゴールを作成</summary>
      <div id="customForm" style="margin-top:8px"></div>
    </details>
  </div>

  <div class="card" id="card">
    <div class="empty">下の「次の例題を引く」をタップ</div>
  </div>
  <div class="actions">
    <button class="btn sec" onclick="nextEx()" id="nextBtn">🎲 次の例題を引く</button>
  </div>
  <div class="grade-btns" id="grades" style="display:none">
    <button class="grade tri" onclick="grade('tri')">△ 解いた</button>
    <button class="grade cir" onclick="grade('cir')">◯ 自力で解けた</button>
    <button class="grade star" onclick="grade('star')">★ 説明できる</button>
  </div>

  <div class="panel">
    <h2>⚙️ 出題設定</h2>
    <div>
      <div style="font-size:12px;color:#888;margin-bottom:4px">必須度</div>
      <span class="chip" data-imp="core" onclick="toggleImp('core')">コア</span>
      <span class="chip" data-imp="recommend" onclick="toggleImp('recommend')">推奨</span>
      <span class="chip" data-imp="optional" onclick="toggleImp('optional')">任意</span>
    </div>
    <div style="margin-top:10px">
      <div style="font-size:12px;color:#888;margin-bottom:4px">難易度</div>
      <span class="chip" data-diff="1" onclick="toggleDiff(1)">★1</span>
      <span class="chip" data-diff="2" onclick="toggleDiff(2)">★2</span>
      <span class="chip" data-diff="3" onclick="toggleDiff(3)">★3</span>
      <span class="chip" data-diff="4" onclick="toggleDiff(4)">★4</span>
      <span class="chip" data-diff="5" onclick="toggleDiff(5)">★5</span>
    </div>
    <div style="margin-top:10px">
      <div style="font-size:12px;color:#888;margin-bottom:4px">出題方針</div>
      <span class="chip" data-mode="weak" onclick="setMode('weak')">弱点優先(未習得を優先)</span>
      <span class="chip" data-mode="random" onclick="setMode('random')">完全ランダム</span>
      <span class="chip" data-mode="unseen" onclick="setMode('unseen')">未着手だけ</span>
    </div>
    <div class="toggle-row">
      <label><input type="checkbox" id="prioCore" checked onchange="saveS()"> コアを優先(重み×3)</label>
    </div>
  </div>

  <div class="panel">
    <h2>📊 進捗(選択中ゴール全体)</h2>
    <div id="overall"></div>
    <details>
      <summary>ゴール別の詳細</summary>
      <div id="byGoal"></div>
    </details>
  </div>

  <div class="panel">
    <h2>📝 直近の記録</h2>
    <div id="history"></div>
    <div class="toolbar">
      <button onclick="exportData()">エクスポート</button>
      <button onclick="resetAll()">全リセット</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

const EXAMPLES = DATA.examples;
const PRESET_GOALS = DATA.goals;
const STORAGE_KEY = 'goal_chart_v2';

let state = {
  selectedGoals: ['stat2'],
  imp: {core:true, recommend:true, optional:false},
  diff: {1:true,2:true,3:true,4:true,5:false},
  mode: 'weak',
  prioCore: true,
  grades: {}, // "book-no" -> 'tri'|'cir'|'star'
  customGoals: [], // {id,name,icon,desc,mappings:{book-no:'core/recommend/optional'}}
};
let history = [];
let current = null;

function load(){
  try{
    const s = localStorage.getItem(STORAGE_KEY);
    if(s){ Object.assign(state, JSON.parse(s)); }
    const h = localStorage.getItem(STORAGE_KEY+'_hist');
    if(h){ history = JSON.parse(h); }
  }catch(e){console.error(e)}
}
function save(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    localStorage.setItem(STORAGE_KEY+'_hist', JSON.stringify(history));
  }catch(e){}
}
function saveS(){
  state.prioCore = document.getElementById('prioCore').checked;
  save();
}

function getAllGoals(){
  return [...PRESET_GOALS, ...state.customGoals];
}
function getGoal(id){
  return getAllGoals().find(g=>g.id===id);
}

function getExImp(ex, goalId){
  const preset = getGoal(goalId);
  if(preset && PRESET_GOALS.find(p=>p.id===goalId)){
    return ex.goals[goalId] || 'none';
  }
  const cg = state.customGoals.find(g=>g.id===goalId);
  if(cg){
    const key = ex.book+'-'+ex.no;
    return cg.mappings[key] || 'none';
  }
  return 'none';
}

function exMatchesSelected(ex){
  // 選択中のいずれかのゴールで、選択中の必須度を持つか
  for(const gid of state.selectedGoals){
    const imp = getExImp(ex, gid);
    if(imp !== 'none' && state.imp[imp]) return imp;
  }
  return null;
}

function getMaxImp(ex){
  // 選択中のゴール全体で最も強い必須度
  const order = {core:3, recommend:2, optional:1};
  let max = 0, maxName = null;
  for(const gid of state.selectedGoals){
    const imp = getExImp(ex, gid);
    if(imp !== 'none' && order[imp] > max){ max = order[imp]; maxName = imp; }
  }
  return maxName;
}

function getPool(){
  if(state.selectedGoals.length === 0) return [];
  return EXAMPLES.filter(e=>{
    const imp = exMatchesSelected(e);
    if(!imp) return false;
    if(!state.diff[e.difficulty]) return false;
    return true;
  });
}

function pickNext(){
  let pool = getPool();
  if(pool.length===0) return null;
  if(state.mode==='unseen'){
    pool = pool.filter(e=>!state.grades[e.book+'-'+e.no]);
    if(pool.length===0) return null;
  } else if(state.mode==='weak'){
    const weights = pool.map(e=>{
      const g = state.grades[e.book+'-'+e.no];
      let base = 10;
      if(g==='tri') base = 5;
      else if(g==='cir') base = 2;
      else if(g==='star') base = 0.3;
      // コア優先重み
      if(state.prioCore){
        const imp = getMaxImp(e);
        if(imp==='core') base *= 3;
        else if(imp==='recommend') base *= 1.5;
      }
      return base;
    });
    const total = weights.reduce((a,b)=>a+b,0);
    let r = Math.random()*total;
    for(let i=0;i<pool.length;i++){
      r -= weights[i];
      if(r<=0) return pool[i];
    }
    return pool[pool.length-1];
  }
  return pool[Math.floor(Math.random()*pool.length)];
}

function nextEx(){
  const e = pickNext();
  current = e;
  if(!e){
    document.getElementById('card').innerHTML = '<div class="empty">該当する例題がありません。ゴール選択や設定を見直してください。</div>';
    document.getElementById('grades').style.display='none';
    document.getElementById('nextBtn').textContent='🎲 もう一度引く';
    return;
  }
  // 関連ゴール表示
  const tags = [];
  for(const gid of state.selectedGoals){
    const imp = getExImp(e, gid);
    if(imp !== 'none'){
      const g = getGoal(gid);
      const cls = imp==='core'?'core':imp==='recommend'?'rec':'opt';
      const lbl = imp==='core'?'コア':imp==='recommend'?'推奨':'任意';
      tags.push(`<span class="tag ${cls}">${g.icon} ${g.name}: ${lbl}</span>`);
    }
  }
  const stars = '★'.repeat(e.difficulty||1) + '☆'.repeat(5-(e.difficulty||1));
  const prev = state.grades[e.book+'-'+e.no];
  const prevHtml = prev ? `<div style="font-size:11px;color:#888;margin-top:6px">前回: ${prev==='tri'?'△':prev==='cir'?'◯':'★'}</div>` : '';
  document.getElementById('card').innerHTML = `
    <div class="card-label">今日の例題</div>
    <div class="ex-no"><span class="kind">${e.kind}</span>${e.no}</div>
    <div class="ex-title">${e.title}</div>
    <div class="diff-stars">${stars}</div>
    <div class="ex-meta">${e.book} / ${e.chapter}${e.section?' / '+e.section:''}</div>
    <div class="ex-meta">${e.page||''}</div>
    <div class="ex-tags">${tags.join('')}</div>
    ${prevHtml}
  `;
  document.getElementById('grades').style.display='flex';
  document.getElementById('nextBtn').textContent='⤴ スキップ';
}

function grade(g){
  if(!current) return;
  state.grades[current.book+'-'+current.no] = g;
  history.unshift({
    book: current.book, no: current.no, title: current.title,
    kind: current.kind, grade: g, ts: Date.now()
  });
  if(history.length>30) history = history.slice(0,30);
  save();
  renderProgress();
  nextEx();
}

function renderGoals(){
  const c = document.getElementById('goalList');
  c.innerHTML = getAllGoals().map(g=>{
    const on = state.selectedGoals.includes(g.id);
    const isCustom = state.customGoals.find(x=>x.id===g.id);
    // 統計
    let coreN=0, recN=0, optN=0, coreCir=0;
    EXAMPLES.forEach(e=>{
      const imp = getExImp(e, g.id);
      if(imp==='core'){ coreN++; if(['cir','star'].includes(state.grades[e.book+'-'+e.no])) coreCir++; }
      else if(imp==='recommend') recN++;
      else if(imp==='optional') optN++;
    });
    const pct = coreN ? Math.round(coreCir/coreN*100) : 0;
    return `<div class="goal-card ${on?'on':''} ${isCustom?'custom':''}" onclick="toggleGoal('${g.id}')">
      <div class="goal-head">
        <div class="goal-icon">${g.icon}</div>
        <div class="goal-info">
          <div class="goal-name">${g.name} ${isCustom?'<span style="font-size:10px;color:#888;font-weight:400">(カスタム)</span>':''}</div>
          <div class="goal-desc">${g.desc||''}</div>
        </div>
        <div style="font-size:11px;color:${on?'#4a9b4a':'#aaa'};font-weight:600">${on?'✓ON':'OFF'}</div>
      </div>
      <div class="goal-stat">
        <span class="core">コア ${coreN}</span>
        <span class="rec">推奨 ${recN}</span>
        <span style="color:#888">任意 ${optN}</span>
      </div>
      <div class="goal-progress">
        <div style="font-size:11px;color:#888;margin-bottom:2px">コア習得 ${coreCir}/${coreN} (${pct}%)</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      ${g.note?`<div class="goal-note">💡 ${g.note}</div>`:''}
      ${isCustom?`<div style="text-align:right;margin-top:6px"><button onclick="event.stopPropagation();editCustom('${g.id}')" style="font-size:11px;background:none;border:1px solid #d4d1c4;padding:3px 8px;border-radius:4px;cursor:pointer">編集</button> <button onclick="event.stopPropagation();deleteCustom('${g.id}')" style="font-size:11px;background:none;border:1px solid #d4d1c4;color:#a04040;padding:3px 8px;border-radius:4px;cursor:pointer;margin-left:4px">削除</button></div>`:''}
    </div>`;
  }).join('');

  // カスタム作成フォーム
  document.getElementById('customForm').innerHTML = `
    <input type="text" id="newGoalName" placeholder="ゴール名(例: 統計検定準1級)">
    <input type="text" id="newGoalIcon" placeholder="絵文字(例: 🔬)" style="margin-top:6px">
    <button class="btn" style="margin-top:6px;width:100%" onclick="openCustomEditor()">章ごとに必須度を設定して作成</button>
  `;
}

function toggleGoal(id){
  const i = state.selectedGoals.indexOf(id);
  if(i>=0) state.selectedGoals.splice(i,1);
  else state.selectedGoals.push(id);
  save();
  renderAll();
}
function toggleImp(k){ state.imp[k]=!state.imp[k]; save(); renderChips(); }
function toggleDiff(d){ state.diff[d]=!state.diff[d]; save(); renderChips(); }
function setMode(m){ state.mode=m; save(); renderChips(); }

function renderChips(){
  document.querySelectorAll('[data-imp]').forEach(el=>el.classList.toggle('on', state.imp[el.dataset.imp]));
  document.querySelectorAll('[data-diff]').forEach(el=>el.classList.toggle('on', state.diff[el.dataset.diff]));
  document.querySelectorAll('[data-mode]').forEach(el=>el.classList.toggle('on', el.dataset.mode===state.mode));
}

function renderProgress(){
  const pool = getPool();
  const total = pool.length;
  let cir=0, star=0, tri=0, none=0;
  pool.forEach(e=>{
    const g = state.grades[e.book+'-'+e.no];
    if(g==='star'){ star++; cir++; }
    else if(g==='cir') cir++;
    else if(g==='tri') tri++;
    else none++;
  });
  const cirPct = total? Math.round(cir/total*100):0;
  const starPct = total? Math.round(star/total*100):0;
  document.getElementById('overall').innerHTML = `
    <div class="stat-row"><span>対象例題</span><strong>${total}例題</strong></div>
    <div class="stat-row"><span>◯以上(自力)</span><strong>${cir} / ${total} (${cirPct}%)</strong></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${cirPct}%"></div></div>
    <div class="stat-row" style="margin-top:6px"><span>★(説明可)</span><strong>${star} / ${total} (${starPct}%)</strong></div>
    <div class="progress-bar"><div class="progress-fill star" style="width:${starPct}%"></div></div>
    <div style="font-size:11px;color:#888;margin-top:6px">未着手 ${none} / △ ${tri} / ◯ ${cir-star} / ★ ${star}</div>
  `;
  // ゴール別
  document.getElementById('byGoal').innerHTML = state.selectedGoals.map(gid=>{
    const g = getGoal(gid);
    if(!g) return '';
    const coreEx = EXAMPLES.filter(e=>getExImp(e,gid)==='core');
    const coreCir = coreEx.filter(e=>['cir','star'].includes(state.grades[e.book+'-'+e.no])).length;
    const coreStar = coreEx.filter(e=>state.grades[e.book+'-'+e.no]==='star').length;
    const pct = coreEx.length? Math.round(coreCir/coreEx.length*100):0;
    return `<div style="margin:8px 0">
      <div style="font-size:12px;display:flex;justify-content:space-between"><strong>${g.icon} ${g.name}</strong><span style="color:#888">コア ${coreCir}/${coreEx.length} (${pct}%) | ★ ${coreStar}</span></div>
      <div class="progress-bar" style="margin-top:3px"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
  // 履歴
  document.getElementById('history').innerHTML = history.length===0
    ? '<div style="font-size:13px;color:#888;text-align:center;padding:12px">まだ記録がありません</div>'
    : history.slice(0,8).map(h=>{
        const gc = h.grade==='tri'?'hg-tri':h.grade==='cir'?'hg-cir':'hg-star';
        const gt = h.grade==='tri'?'△':h.grade==='cir'?'◯':'★';
        return `<div class="hist-row">
          <div style="flex:1;min-width:0">
            <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.kind} ${h.no} ${h.title}</div>
            <div class="hist-meta">${h.book} / ${formatAgo(h.ts)}</div>
          </div>
          <span class="hist-grade ${gc}">${gt}</span>
        </div>`;
      }).join('');
}

function formatAgo(ts){
  const d=(Date.now()-ts)/1000;
  if(d<60) return 'たった今';
  if(d<3600) return Math.floor(d/60)+'分前';
  if(d<86400) return Math.floor(d/3600)+'時間前';
  return Math.floor(d/86400)+'日前';
}

function openCustomEditor(existing){
  const name = existing ? existing.name : document.getElementById('newGoalName').value.trim();
  const icon = existing ? existing.icon : (document.getElementById('newGoalIcon').value.trim() || '⭐');
  if(!name){ alert('ゴール名を入力してください'); return; }
  // 全章リスト
  const chapMap = {};
  EXAMPLES.forEach(e=>{
    const k = e.book+'|'+e.chapter;
    if(!chapMap[k]) chapMap[k] = {book:e.book, chapter:e.chapter, count:0};
    chapMap[k].count++;
  });
  const chaps = Object.values(chapMap);
  // 既存マッピングを章単位の状態に変換(例題単位ではなく、章の中で何個coreか見て決める)
  const chapDefault = {};
  chaps.forEach(c=>{
    if(existing){
      const exsInChap = EXAMPLES.filter(e=>e.book===c.book && e.chapter===c.chapter);
      const counts = {core:0,recommend:0,optional:0,none:0};
      exsInChap.forEach(e=>{
        const m = existing.mappings[e.book+'-'+e.no] || 'none';
        counts[m]++;
      });
      // 最も多いものをデフォルトに
      let max = 0, def = 'none';
      Object.entries(counts).forEach(([k,v])=>{ if(v>max){ max=v; def=k; }});
      chapDefault[c.book+'|'+c.chapter] = def;
    } else {
      chapDefault[c.book+'|'+c.chapter] = 'none';
    }
  });

  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <h3>${existing?'編集':'作成'}: ${icon} ${name}</h3>
    <div style="font-size:12px;color:#666;margin-bottom:10px">各章に対して必須度を設定してください。「該当なし」の章は出題されません。</div>
    <div class="chap-grid">
      ${chaps.map(c=>{
        const cur = chapDefault[c.book+'|'+c.chapter];
        return `<div class="chap-row">
          <div class="chap-name">${c.book} / ${c.chapter} <span style="color:#aaa">(${c.count})</span></div>
          <select data-key="${c.book}|${c.chapter}">
            <option value="none" ${cur==='none'?'selected':''}>—</option>
            <option value="core" ${cur==='core'?'selected':''}>コア</option>
            <option value="recommend" ${cur==='recommend'?'selected':''}>推奨</option>
            <option value="optional" ${cur==='optional'?'selected':''}>任意</option>
          </select>
        </div>`;
      }).join('')}
    </div>
    <button class="modal-close" onclick="saveCustom('${existing?existing.id:''}', '${escapeStr(name)}', '${escapeStr(icon)}')">保存</button>
    <button class="btn sec" style="width:100%;margin-top:6px" onclick="closeModal()">キャンセル</button>
  `;
  document.getElementById('modal').classList.add('show');
}
function escapeStr(s){ return s.replace(/'/g,"\\'"); }
function saveCustom(existingId, name, icon){
  const selects = document.querySelectorAll('#modalContent select');
  const mappings = {};
  selects.forEach(sel=>{
    const v = sel.value;
    if(v==='none') return;
    const [book, chap] = sel.dataset.key.split('|');
    EXAMPLES.filter(e=>e.book===book && e.chapter===chap).forEach(e=>{
      mappings[e.book+'-'+e.no] = v;
    });
  });
  if(existingId){
    const g = state.customGoals.find(x=>x.id===existingId);
    if(g){ g.name=name; g.icon=icon; g.mappings=mappings; }
  } else {
    const id = 'custom_'+Date.now();
    state.customGoals.push({
      id, name, icon, desc:'カスタムゴール', mappings, note:''
    });
    state.selectedGoals.push(id);
  }
  save();
  closeModal();
  document.getElementById('newGoalName').value='';
  document.getElementById('newGoalIcon').value='';
  renderAll();
}
function editCustom(id){
  const g = state.customGoals.find(x=>x.id===id);
  if(g) openCustomEditor(g);
}
function deleteCustom(id){
  if(!confirm('このカスタムゴールを削除しますか?')) return;
  state.customGoals = state.customGoals.filter(g=>g.id!==id);
  state.selectedGoals = state.selectedGoals.filter(g=>g!==id);
  save();
  renderAll();
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }

function exportData(){
  const blob = new Blob([JSON.stringify({state,history},null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='goal_chart_progress_'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(url);
}
function resetAll(){
  if(!confirm('全進捗と履歴を削除しますか?(カスタムゴールは残ります)')) return;
  state.grades={}; history=[]; save(); renderProgress();
}

function renderAll(){
  renderGoals();
  renderChips();
  renderProgress();
}

load();
renderAll();
</script>
</body>
</html>
